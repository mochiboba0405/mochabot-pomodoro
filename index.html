<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mocha Café Pomodoro v2 🍵</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Light mode (default) ── */
    :root {
      --bg:         #fdf6ec;
      --card-bg:    #fffaf4;
      --card-border:rgba(200,149,108,0.2);
      --shadow:     rgba(107,66,38,0.15);

      --brown-light:#c8956c;
      --brown:      #9b6b47;
      --brown-dark: #6b4226;

      --sage:       #a8c5a0;
      --sage-dark:  #7aaa6e;
      --blush:      #f2b8c6;
      --blush-dark: #e991ab;
      --yellow:     #fde8a0;

      --toggle-bg:  #f0e8df;
      --toggle-inactive: var(--brown-light);
      --ring-track: #f0e8df;
      --mood-color: var(--brown);

      --deco-opacity: 0.35;
    }

    /* ── Weather themes ── */
    body[data-weather="sunny"]  { --bg:#fff9e6; --card-bg:#fffde0; --card-border:rgba(255,179,71,0.3); --brown-light:#c8860a; --brown:#9b6200; --brown-dark:#7a4e00; --blush:#ffcc70; --blush-dark:#f0a500; --sage:#b8d96e; --sage-dark:#8ab830; --yellow:#fff0b0; --toggle-bg:#fef3c0; --ring-track:#fde8a0; --mood-color:#9b6200; }
    body[data-weather="rainy"]  { --bg:#e8f0f7; --card-bg:#ddeaf5; --card-border:rgba(122,175,212,0.3); --brown-light:#7aafd4; --brown:#4a7fa5; --brown-dark:#2c4a6e; --blush:#a8d4f0; --blush-dark:#7aafd4; --sage:#78b8c8; --sage-dark:#4a90a8; --yellow:#ddeaf5; --toggle-bg:#cce0f0; --ring-track:#b8d4e8; --mood-color:#2c4a6e; }
    body[data-weather="snowy"]  { --bg:#f0f8ff; --card-bg:#e0f2ff; --card-border:rgba(137,196,225,0.3); --brown-light:#89c4e1; --brown:#4a90b8; --brown-dark:#2c5f7a; --blush:#b8e0f8; --blush-dark:#89c4e1; --sage:#a0d8c8; --sage-dark:#60b0a0; --yellow:#e0f2ff; --toggle-bg:#cce8f4; --ring-track:#b0d8f0; --mood-color:#2c5f7a; }
    body[data-weather="sakura"] { --bg:#fff0f5; --card-bg:#ffe8f0; --card-border:rgba(232,135,156,0.3); --brown-light:#e8879c; --brown:#c85070; --brown-dark:#7a3050; --blush:#ffb7c5; --blush-dark:#e8879c; --sage:#f0a0b8; --sage-dark:#d07090; --yellow:#ffe0ec; --toggle-bg:#ffd0e0; --ring-track:#ffb7c5; --mood-color:#7a3050; }
    body[data-weather="cloudy"] { --bg:#f0eef5; --card-bg:#e8e5f0; --card-border:rgba(155,147,179,0.3); --brown-light:#9b93b3; --brown:#6b6090; --brown-dark:#3d3560; --blush:#c5bfd4; --blush-dark:#9b93b3; --sage:#a8a8c8; --sage-dark:#7878a8; --yellow:#e8e5f0; --toggle-bg:#dddaf0; --ring-track:#c5bfd4; --mood-color:#3d3560; }

    /* ── Dark mode (night café) ── */
    body.dark {
      --bg:         #1a1a2e;
      --card-bg:    #16213e;
      --card-border:rgba(130,90,180,0.35);
      --shadow:     rgba(0,0,0,0.45);

      --brown-light:#c9a96e;
      --brown:      #e2c27d;
      --brown-dark: #f0d9a8;

      --sage:       #4a7c6f;
      --sage-dark:  #5ea08e;
      --blush:      #9b6bb5;
      --blush-dark: #c084d8;
      --yellow:     #3d3520;

      --toggle-bg:  #0f3460;
      --toggle-inactive: #7b8db0;
      --ring-track: #0f3460;
      --mood-color: #c9a96e;

      --deco-opacity: 0.22;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
      transition: background 0.4s ease;
    }

    /* ── Floating deco ── */
    .deco {
      position: fixed;
      pointer-events: none;
      font-size: 1.6rem;
      opacity: var(--deco-opacity);
      animation: float 6s ease-in-out infinite;
      user-select: none;
      transition: opacity 0.4s;
    }
    .deco:nth-child(1)  { top: 5%;  left: 4%;  animation-delay: 0s;   font-size: 2rem; }
    .deco:nth-child(2)  { top: 12%; right: 6%; animation-delay: 1.2s; font-size: 1.4rem; }
    .deco:nth-child(3)  { top: 50%; left: 2%;  animation-delay: 2s;   font-size: 1.8rem; }
    .deco:nth-child(4)  { bottom: 10%; left: 7%;  animation-delay: 0.5s; }
    .deco:nth-child(5)  { bottom: 6%;  right: 5%; animation-delay: 1.7s; font-size: 2rem; }
    .deco:nth-child(6)  { top: 35%; right: 3%; animation-delay: 2.8s; font-size: 1.3rem; }
    .deco:nth-child(7)  { bottom: 30%; left: 3%; animation-delay: 3.5s; font-size: 1.2rem; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50%       { transform: translateY(-12px) rotate(5deg); }
    }

    /* ── Dark-mode toggle button ── */
    #dark-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--blush);
      border: 3px solid var(--blush-dark);
      border-radius: 50px;
      width: auto;
      height: 40px;
      padding: 0 14px;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 14px var(--shadow);
      transition: all 0.3s ease;
      z-index: 100;
      color: var(--brown-dark);
      white-space: nowrap;
    }
    #dark-toggle:hover { transform: scale(1.05); filter: brightness(1.05); }
    body.dark #dark-toggle { background: #2e2b50; border-color: #a78bfa; color: #f0d9a8; }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 32px;
      padding: 32px 36px 36px;
      max-width: 440px;
      width: 100%;
      box-shadow:
        0 8px 32px var(--shadow),
        0 2px 8px rgba(200,149,108,0.12),
        inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
      border: 2.5px solid var(--card-border);
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .cafe-title {
      font-size: 1.0rem;
      font-weight: 700;
      color: var(--brown-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .app-name {
      font-size: 1.65rem;
      font-weight: 900;
      color: var(--brown-dark);
      line-height: 1.1;
    }

    /* ── Character + speech bubble ── */
    .character-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
      position: relative;
    }
    .character-bubble {
      background: var(--yellow);
      border-radius: 50%;
      width: 110px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.6rem;
      box-shadow: 0 4px 18px rgba(200,149,108,0.25), 0 1px 4px rgba(200,149,108,0.15);
      border: 3px solid rgba(253,232,160,0.5);
      position: relative;
      animation: bobble 3s ease-in-out infinite;
      transition: background 0.4s;
    }
    @keyframes bobble {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-6px) scale(1.04); }
    }
    .speech-bubble {
      position: absolute;
      top: -54px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      border: 2px solid var(--blush);
      border-radius: 14px;
      padding: 6px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--brown-dark);
      white-space: nowrap;
      box-shadow: 0 2px 10px var(--shadow);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
      z-index: 10;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--blush);
    }
    .speech-bubble.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-3px);
    }

    /* ── Presets ── */
    .presets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }
    .preset-btn {
      border: 2px solid var(--card-border);
      border-radius: 14px;
      background: var(--toggle-bg);
      color: var(--brown);
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      line-height: 1.3;
    }
    .preset-btn:hover:not(:disabled) {
      background: var(--blush);
      color: var(--brown-dark);
      border-color: var(--blush-dark);
      transform: translateY(-1px);
    }
    .preset-btn.active {
      background: var(--blush);
      color: var(--brown-dark);
      border-color: var(--blush-dark);
      box-shadow: 0 2px 8px var(--shadow);
    }
    .preset-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .preset-name { display: block; }
    .preset-sub  { display: block; font-weight: 600; font-size: 0.68rem; opacity: 0.75; }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      background: var(--toggle-bg);
      border-radius: 50px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 22px;
      transition: background 0.4s;
    }
    .mode-btn {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: 46px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.25s ease;
      background: transparent;
      color: var(--toggle-inactive);
    }
    .mode-btn.active {
      background: var(--card-bg);
      color: var(--brown-dark);
      box-shadow: 0 2px 10px var(--shadow);
    }
    .mode-btn.focus.active { background: var(--blush); color: var(--brown-dark); }
    .mode-btn.break.active { background: var(--sage);  color: #1a4a30; }

    /* ── Timer ring ── */
    .timer-section {
      text-align: center;
      margin-bottom: 8px;
    }
    .timer-ring-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 12px;
    }
    .timer-ring-wrap svg {
      transform: rotate(-90deg);
      position: absolute;
      top: 0; left: 0;
    }
    #progress-ring {
      transition: stroke-dashoffset 1s linear, stroke 0.4s;
      stroke-linecap: round;
    }
    #ring-track { transition: stroke 0.4s; }
    .timer-face {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #timer-display {
      font-size: 3.4rem;
      font-weight: 900;
      color: var(--brown-dark);
      line-height: 1;
      letter-spacing: -1px;
      transition: color 0.4s;
    }
    .timer-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--brown-light);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Mood message ── */
    #mood-msg {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--mood-color);
      margin-bottom: 20px;
      min-height: 1.4em;
      transition: opacity 0.4s, color 0.4s;
      padding: 0 10px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 22px;
    }
    .ctrl-btn {
      border: none;
      border-radius: 18px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 3px 10px var(--shadow);
    }
    .ctrl-btn:active { transform: scale(0.95); }

    #btn-start {
      background: var(--blush);
      color: var(--brown-dark);
      padding: 13px 30px;
      font-size: 1rem;
    }
    #btn-start:hover { background: var(--blush-dark); color: white; }
    #btn-start.running {
      background: var(--sage);
      color: #1a4a30;
    }
    #btn-start.running:hover { background: var(--sage-dark); color: white; }

    #btn-reset {
      background: var(--yellow);
      color: var(--brown-dark);
      padding: 13px 18px;
      font-size: 1rem;
      transition: all 0.18s ease, background 0.4s;
    }
    #btn-reset:hover { filter: brightness(0.92); }

    /* ── Pomodoro counter ── */
    .pomodoro-row {
      border-top: 2px dashed rgba(200,149,108,0.2);
      padding-top: 18px;
      text-align: center;
    }
    .pomo-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .pomo-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--brown-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    #btn-reset-counter {
      font-family: 'Nunito', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      background: var(--toggle-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 8px;
      color: var(--toggle-inactive);
      padding: 2px 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #btn-reset-counter:hover {
      background: var(--blush);
      color: var(--brown-dark);
      border-color: var(--blush-dark);
    }
    .tomatoes {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .tomato {
      font-size: 1.4rem;
      filter: grayscale(1) opacity(0.3);
      transition: all 0.4s ease;
      transform: scale(0.85);
    }
    .tomato.done {
      filter: none;
      transform: scale(1);
    }
    .tomato.pop {
      animation: tomato-pop 0.45s cubic-bezier(.36,1.8,.6,1) forwards;
    }
    @keyframes tomato-pop {
      0%   { transform: scale(0.4); filter: none; }
      60%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    #pomo-count-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--brown);
    }

    /* ── Weather selector ── */
    .weather-selector {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .weather-btn {
      border: 2px solid var(--card-border);
      border-radius: 50px;
      background: var(--toggle-bg);
      color: var(--brown);
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 5px 11px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .weather-btn:hover { background: var(--blush); border-color: var(--blush-dark); color: var(--brown-dark); transform: translateY(-1px); }
    .weather-btn.active { background: var(--blush); border-color: var(--blush-dark); color: var(--brown-dark); box-shadow: 0 2px 8px var(--shadow); }

    /* ── Cozy Scene ── */
    .scene-section {
      max-width: 440px;
      width: 100%;
      margin-top: 18px;
      background: var(--card-bg);
      border: 2.5px solid var(--card-border);
      border-radius: 24px;
      padding: 16px 18px;
      box-shadow: 0 8px 32px var(--shadow);
      transition: background 0.4s, border-color 0.4s;
    }
    .scene-title {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--brown-light);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
    }
    .scene-controls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 10px;
    }
    .scene-btn {
      border: 2px solid var(--card-border);
      border-radius: 20px;
      background: var(--toggle-bg);
      color: var(--brown);
      font-family: 'Nunito', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 5px 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .scene-btn.active { background: var(--blush); border-color: var(--blush-dark); }
    .scene-btn:hover  { background: var(--blush); }
    /* canvas */
    #cozy-canvas {
      width: 100%;
      height: 200px;
      border-radius: 16px;
      display: block;
      margin-bottom: 10px;
    }
    /* ambience row */
    .amb-btn {
      border: 2px solid var(--card-border);
      border-radius: 20px;
      background: var(--toggle-bg);
      color: var(--brown);
      font-family: 'Nunito', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 5px 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .amb-btn.active { background: var(--sage); border-color: var(--sage-dark); color: #1a4a30; }
    .amb-btn:hover  { background: var(--sage); }
    .audio-controls { margin-top: 10px; }
    .audio-modes {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 10px;
    }
    .audio-playbar {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 6px;
    }
    #btn-audio-play {
      border: 2px solid var(--card-border);
      border-radius: 20px;
      background: var(--blush);
      color: var(--brown-dark);
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #btn-audio-play:disabled { opacity: 0.4; cursor: default; }
    #btn-audio-play:not(:disabled):hover { background: var(--blush-dark); color: white; }
    #vol-slider { width: 100px; accent-color: var(--blush-dark); cursor: pointer; }
    #audio-status {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--brown-light);
      margin: 0;
      opacity: 0.8;
    }

    /* ── Finish flash ── */
    @keyframes finish-flash {
      0%   { box-shadow: 0 8px 32px var(--shadow), 0 0 0 0 rgba(242,184,198,0.7); }
      50%  { box-shadow: 0 8px 32px var(--shadow), 0 0 0 20px rgba(242,184,198,0); }
      100% { box-shadow: 0 8px 32px var(--shadow), 0 0 0 0 rgba(242,184,198,0); }
    }
    .card.flash { animation: finish-flash 0.6s ease 3; }

    @media (max-width: 480px) {
      .card { padding: 24px 18px 28px; }
      #timer-display { font-size: 2.9rem; }
      .timer-ring-wrap { width: 180px; height: 180px; }
      .preset-btn { font-size: 0.72rem; padding: 7px 8px; }
    }
  </style>
</head>
<body>

  <!-- Floating decorations -->
  <span class="deco">🍃</span>
  <span class="deco">🌸</span>
  <span class="deco">☕</span>
  <span class="deco">🌿</span>
  <span class="deco">🍵</span>
  <span class="deco">🌷</span>
  <span class="deco">🍂</span>

  <!-- Dark mode toggle -->
  <button id="dark-toggle" title="Toggle night café mode">🌙 Night Café</button>

  <div class="card" id="card">

    <div class="header">
      <div class="cafe-title">☕ Mocha Café ☕</div>
      <div class="app-name">Pomodoro Timer v3</div>
    </div>

    <!-- Bear character -->
    <div class="character-wrap">
      <div class="character-bubble" id="character">
        🐻
        <div class="speech-bubble" id="speech">Let's do this~ ☕</div>
      </div>
    </div>

    <!-- Weather selector -->
    <div class="weather-selector" id="weather-selector">
      <button class="weather-btn active" data-weather="">🌿 Default</button>
      <button class="weather-btn" data-weather="sunny">☀️ Sunny</button>
      <button class="weather-btn" data-weather="rainy">🌧️ Rainy</button>
      <button class="weather-btn" data-weather="snowy">❄️ Snowy</button>
      <button class="weather-btn" data-weather="sakura">🌸 Sakura</button>
      <button class="weather-btn" data-weather="cloudy">☁️ Cloudy</button>
    </div>

    <!-- Focus presets -->
    <div class="presets" id="presets">
      <button class="preset-btn active" data-preset="classic" onclick="applyPreset('classic')">
        <span class="preset-name">🍅 25/5 Classic</span>
        <span class="preset-sub">Focus 25 · Break 5</span>
      </button>
      <button class="preset-btn" data-preset="deep" onclick="applyPreset('deep')">
        <span class="preset-name">🧠 45/10 Deep Focus</span>
        <span class="preset-sub">Focus 45 · Break 10</span>
      </button>
      <button class="preset-btn" data-preset="cozy" onclick="applyPreset('cozy')">
        <span class="preset-name">🌱 15/5 Cozy Focus</span>
        <span class="preset-sub">Focus 15 · Break 5</span>
      </button>
      <button class="preset-btn" data-preset="tiny" onclick="applyPreset('tiny')">
        <span class="preset-name">⚡ 10/2 Tiny Task</span>
        <span class="preset-sub">Focus 10 · Break 2</span>
      </button>
    </div>

    <!-- Mode toggle -->
    <div class="mode-toggle">
      <button class="mode-btn focus active" id="btn-focus" onclick="setMode('focus')">🍅 Focus</button>
      <button class="mode-btn break"        id="btn-break" onclick="setMode('break')">🌿 Break</button>
    </div>

    <!-- Timer ring -->
    <div class="timer-section">
      <div class="timer-ring-wrap">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle id="ring-track" cx="100" cy="100" r="85"
            fill="none" stroke="#f0e8df" stroke-width="10"/>
          <circle id="progress-ring" cx="100" cy="100" r="85"
            fill="none" stroke="#f2b8c6" stroke-width="10"
            stroke-dasharray="534" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-face">
          <div id="timer-display">25:00</div>
          <div class="timer-label" id="timer-label">Focus</div>
        </div>
      </div>
      <div id="mood-msg">Ready to brew some focus? ☕</div>
    </div>

    <!-- Buttons -->
    <div class="controls">
      <button class="ctrl-btn" id="btn-start" onclick="toggleTimer()">▶ Start</button>
      <button class="ctrl-btn" id="btn-reset" onclick="resetTimer()">↺ Reset</button>
    </div>

    <!-- Pomodoro counter -->
    <div class="pomodoro-row">
      <div class="pomo-header">
        <div class="pomo-title">Completed Pomodoros</div>
        <button id="btn-reset-counter" onclick="resetCounter()">reset</button>
      </div>
      <div class="tomatoes" id="tomatoes"></div>
      <div id="pomo-count-label">0 pomodoros today</div>
    </div>

  </div><!-- end card -->

  <!-- Cozy Scene -->
  <div class="scene-section">
    <div class="scene-title">🌿 Cozy Study Corner</div>
    <div class="scene-controls">
      <button class="scene-btn active" data-scene="sunny">☀️ Sunny</button>
      <button class="scene-btn" data-scene="rain">🌧️ Rainy</button>
      <button class="scene-btn" data-scene="night">🌙 Night</button>
      <button class="scene-btn" data-scene="sakura">🌸 Sakura</button>
      <button class="scene-btn" data-scene="cafe">☕ Café</button>
    </div>
    <canvas id="cozy-canvas"></canvas>
    <!-- Audio controls -->
    <div class="audio-controls">
      <div class="audio-modes">
        <button class="amb-btn" data-amb="rain">☔ Rain Lofi</button>
        <button class="amb-btn" data-amb="night">🌙 Night Lofi</button>
        <button class="amb-btn" data-amb="cafe">☕ Café Lofi</button>
        <button class="amb-btn" data-amb="piano">🎹 Soft Piano</button>
      </div>
      <div class="audio-playbar">
        <button id="btn-audio-play" disabled>▶️ Play</button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.5">
        <span id="vol-icon">🔊</span>
      </div>
      <p id="audio-status">← pick a mode to start</p>
    </div>
  </div>

  <script>
    // ── Presets ──
    const PRESETS = {
      classic: { focus: 25, break: 5 },
      deep:    { focus: 45, break: 10 },
      cozy:    { focus: 15, break: 5 },
      tiny:    { focus: 10, break: 2 },
    };
    let activePreset = 'classic';

    // ── Mode durations (driven by preset) ──
    const MODES = {
      focus: { label: 'Focus', ring: '#f2b8c6' },
      break: { label: 'Break', ring: '#a8c5a0' },
    };

    function getModeDuration(m) {
      return (m === 'focus' ? PRESETS[activePreset].focus : PRESETS[activePreset].break) * 60;
    }

    const FOCUS_MSGS = [
      'Ready to brew some focus? ☕',
      'You got this, little barista! 🌟',
      'Deep work mode: activated ✨',
      'One task at a time, cutie! 🍵',
      'Your future self thanks you 🐻',
      'Sip by sip, step by step! ☕',
    ];
    const BREAK_MSGS = [
      'Time to rest your paws! 🐾',
      'Stretch and breathe, you earned it! 🌿',
      'Grab a cozy snack, friend! 🍪',
      'The garden misses you! 🌸',
      'Recharge like a leaf in the sun 🌱',
      'A little break makes a big day! 🌈',
    ];

    let mode      = 'focus';
    let totalSecs = getModeDuration('focus');
    let remaining = totalSecs;
    let running   = false;
    let interval  = null;
    let pomoCount = parseInt(localStorage.getItem('mocha-pomo-count') || '0', 10);
    const RING_CIRC = 2 * Math.PI * 85; // ≈ 534

    // ── DOM refs ──
    const displayEl  = document.getElementById('timer-display');
    const labelEl    = document.getElementById('timer-label');
    const moodEl     = document.getElementById('mood-msg');
    const ring       = document.getElementById('progress-ring');
    const ringTrack  = document.getElementById('ring-track');
    const btnStart   = document.getElementById('btn-start');
    const tomatoWrap = document.getElementById('tomatoes');
    const pomoLabel  = document.getElementById('pomo-count-label');
    const speech     = document.getElementById('speech');
    const card       = document.getElementById('card');
    const darkToggle = document.getElementById('dark-toggle');
    const presetsEl  = document.getElementById('presets');

    // ── Init ring ──
    ring.style.strokeDasharray  = RING_CIRC;
    ring.style.strokeDashoffset = 0;

    // ── Dark mode ──
    const savedDark = localStorage.getItem('mocha-dark') === 'true';
    if (savedDark) enableDark();

    function enableDark() {
      document.body.classList.add('dark');
      darkToggle.textContent = '☀️';
      // Update ring track stroke for dark
      ringTrack.style.stroke = '#0f3460';
    }
    function disableDark() {
      document.body.classList.remove('dark');
      darkToggle.textContent = '🌙';
      ringTrack.style.stroke = '#f0e8df';
    }

    darkToggle.addEventListener('click', () => {
      const isDark = document.body.classList.contains('dark');
      if (isDark) { disableDark(); localStorage.setItem('mocha-dark', 'false'); darkToggle.textContent = '🌙 Night Café'; }
      else        { enableDark();  localStorage.setItem('mocha-dark', 'true');  darkToggle.textContent = '☀️ Day Café'; }
    });

    // ── Web Audio chime ──
    function playChime() {
      try {
        const ctx   = new (window.AudioContext || window.webkitAudioContext)();
        const notes = [523.25, 659.25, 783.99, 1046.5];
        notes.forEach((freq, i) => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          const t = ctx.currentTime + i * 0.22;
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.18, t + 0.04);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.65);
          osc.start(t);
          osc.stop(t + 0.7);
        });
      } catch(e) {}
    }

    // ── Helpers ──
    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    function updateRing() {
      const pct    = remaining / totalSecs;
      const offset = RING_CIRC * (1 - pct);
      ring.style.strokeDashoffset = offset;
    }

    function pickMsg(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function setMoodMsg(override) {
      moodEl.style.opacity = 0;
      setTimeout(() => {
        if (override) {
          moodEl.textContent = override;
        } else {
          moodEl.textContent = running
            ? pickMsg(mode === 'focus' ? FOCUS_MSGS : BREAK_MSGS)
            : (mode === 'focus' ? 'Ready to brew some focus? ☕' : 'Time to rest your paws! 🐾');
        }
        moodEl.style.opacity = 1;
      }, 220);
    }

    // ── Bear expressions ──
    const character = document.getElementById('character');
    function setBear(expr) {
      // Only update the text node (first child), not the speech bubble
      character.childNodes[0].textContent = expr + ' ';
    }

    // ── Speech bubble ──
    let speechTimer = null;
    function showSpeech(msg) {
      speech.textContent = msg;
      speech.classList.add('show');
      if (speechTimer) clearTimeout(speechTimer);
      speechTimer = setTimeout(hideSpeech, 3800);
    }
    function hideSpeech() {
      speech.classList.remove('show');
    }

    // ── Tomato counter ──
    function buildTomatoes() {
      tomatoWrap.innerHTML = '';
      const show = Math.max(pomoCount + 1, 4);
      for (let i = 0; i < show; i++) {
        const t = document.createElement('span');
        t.className = 'tomato' + (i < pomoCount ? ' done' : '');
        t.textContent = '🍅';
        tomatoWrap.appendChild(t);
      }
      pomoLabel.textContent = `${pomoCount} pomodoro${pomoCount !== 1 ? 's' : ''} today`;
    }

    function addPomodoro() {
      pomoCount++;
      localStorage.setItem('mocha-pomo-count', pomoCount);
      buildTomatoes();
      const done = tomatoWrap.querySelectorAll('.tomato.done');
      const last = done[done.length - 1];
      if (last) {
        last.classList.add('pop');
        last.addEventListener('animationend', () => last.classList.remove('pop'), { once: true });
      }
    }

    function resetCounter() {
      if (confirm('Reset your pomodoro count to 0?')) {
        pomoCount = 0;
        localStorage.setItem('mocha-pomo-count', 0);
        buildTomatoes();
      }
    }

    // ── Presets ──
    function applyPreset(key) {
      if (running) return; // only when not running
      activePreset = key;
      // Update active button
      document.querySelectorAll('.preset-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.preset === key);
      });
      // Re-apply current mode with new duration
      totalSecs = getModeDuration(mode);
      remaining = totalSecs;
      displayEl.textContent = fmt(remaining);
      updateRing();
    }

    // ── Disable/enable preset buttons while running ──
    function setPresetBtnsDisabled(disabled) {
      document.querySelectorAll('.preset-btn').forEach(b => b.disabled = disabled);
    }

    // ── Core ──
    function tick() {
      if (remaining <= 0) {
        clearInterval(interval);
        running = false;
        btnStart.textContent = '▶ Start';
        btnStart.classList.remove('running');
        setPresetBtnsDisabled(false);

        if (mode === 'focus') {
          addPomodoro();
          setBear('🧸🎉');
          showSpeech('Yay! Break time~ 🎉');
        } else {
          setBear('🧸✨');
          showSpeech('Ready to focus again? 🍅');
        }
        playChime();
        card.classList.add('flash');
        card.addEventListener('animationend', () => card.classList.remove('flash'), { once: true });
        setMoodMsg();
        return;
      }
      remaining--;
      displayEl.textContent = fmt(remaining);
      updateRing();
    }

    function toggleTimer() {
      if (running) {
        clearInterval(interval);
        running = false;
        btnStart.innerHTML = '▶ Start';
        btnStart.classList.remove('running');
        setPresetBtnsDisabled(false);
        setBear('🧸💤');
        showSpeech('Taking a lil break? (˶ᵔ ᵕ ᵔ˶)');
      } else {
        running = true;
        interval = setInterval(tick, 1000);
        btnStart.innerHTML = '⏸ Pause';
        btnStart.classList.add('running');
        setPresetBtnsDisabled(true);
        setBear(mode === 'focus' ? '🐻' : '🧸☕');
        showSpeech("Let's do this~ ☕");
      }
      setMoodMsg();
    }

    function resetTimer() {
      clearInterval(interval);
      running   = false;
      totalSecs = getModeDuration(mode);
      remaining = totalSecs;
      displayEl.textContent = fmt(remaining);
      updateRing();
      btnStart.innerHTML = '▶ Start';
      btnStart.classList.remove('running');
      setPresetBtnsDisabled(false);
      setBear('🧸');
      showSpeech('Okay, fresh start! 🌸');
      setMoodMsg();
    }

    function setMode(m) {
      if (running) { clearInterval(interval); running = false; setPresetBtnsDisabled(false); }
      mode      = m;
      totalSecs = getModeDuration(m);
      remaining = totalSecs;

      ring.style.stroke = MODES[m].ring;
      labelEl.textContent = MODES[m].label;
      displayEl.textContent = fmt(remaining);
      updateRing();

      document.getElementById('btn-focus').classList.toggle('active', m === 'focus');
      document.getElementById('btn-break').classList.toggle('active', m === 'break');
      btnStart.innerHTML = '▶ Start';
      btnStart.classList.remove('running');

      hideSpeech();
      setMoodMsg();
    }

    // ── Cozy Scene ──
    const canvas = document.getElementById('cozy-canvas');
    const ctx    = canvas.getContext('2d');
    let sceneType = 'sunny';
    let particles = [];
    let animals   = [];
    let frameId   = null;
    let treeWobble = 0;

    function resizeCanvas() {
      canvas.width  = canvas.offsetWidth  * devicePixelRatio;
      canvas.height = canvas.offsetHeight * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);
    }
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); initScene(sceneType); });

    const SCENES = {
      sunny: { sky:['#fff9e6','#ffe4a0'], ground:'#b5d99c', groundLine:'#7cba5a', particles:'leaf' },
      rain:  { sky:['#c8d8e8','#8fa8c0'], ground:'#7a9a7a', groundLine:'#4a7a5a', particles:'rain' },
      night: { sky:['#1a1a3a','#0d0d2b'], ground:'#2a3a2a', groundLine:'#1a2a1a', particles:'star' },
      sakura:{ sky:['#fce4ec','#f8bbd0'], ground:'#c8dba8', groundLine:'#a0c080', particles:'petal' },
      cafe:  { sky:['#f5e6d3','#e8c9a0'], ground:'#c8a870', groundLine:'#a07840', particles:'leaf' },
    };

    // Simple animal data: {x, y, type, dir, speed, frame}
    function makeAnimal(type) {
      const w = canvas.offsetWidth;
      return { x: Math.random() * w, y: 0, type, dir: Math.random()<0.5?1:-1,
               speed: 0.15 + Math.random()*0.2, frame: Math.random()*100 };
    }
    function placeAnimals() {
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      animals = [
        { x: w*0.2, y: h*0.68, type:'bear', dir:1, speed:0, frame:0 },
        { x: w*0.7, y: h*0.70, type:'bunny', dir:-1, speed:0, frame:30 },
        { x: w*0.5, y: h*0.65, type:'cat', dir:1, speed:0.05, frame:15 },
      ];
    }

    function drawAnimal(a, sc) {
      const s = SCENES[sc];
      const t = a.frame;
      const bobY = Math.sin(t * 0.05) * 2;
      const x = a.x, y = a.y + bobY;
      ctx.save();
      if (a.dir < 0) { ctx.translate(x*2, 0); ctx.scale(-1, 1); }
      ctx.font = '22px serif';
      ctx.textAlign = 'center';
      const emojis = { bear:'🐻', bunny:'🐰', cat:'🐱' };
      ctx.fillText(emojis[a.type] || '🐾', x, y);
      ctx.restore();
    }

    function drawTree(x, y, sc, wobble) {
      const s = SCENES[sc];
      const h = canvas.offsetHeight;
      // trunk
      ctx.save();
      ctx.strokeStyle = sc==='night' ? '#5a3a1a' : '#8B5E3C';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(x, y);
      const lean = Math.sin(wobble*0.02)*3;
      ctx.bezierCurveTo(x+lean, y-25, x+lean*2, y-50, x, y-70);
      ctx.stroke();
      // canopy
      const colors = {
        sunny:['#5cb85c','#3a8c3a'], rain:['#4a8a4a','#2a6a2a'],
        night:['#1a3a1a','#0d2a0d'], sakura:['#f48fb1','#e91e8c'],
        cafe: ['#8B7355','#6B5335']
      };
      ctx.fillStyle = colors[sc]?.[0] || '#5cb85c';
      ctx.beginPath();
      ctx.arc(x, y-75, 28, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = colors[sc]?.[1] || '#3a8c3a';
      ctx.beginPath();
      ctx.arc(x-10, y-85, 20, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function drawCabin(sc) {
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      const bx = w*0.35, by = h*0.55;
      // walls
      ctx.fillStyle = sc==='night' ? '#2a1a0a' : '#c8956a';
      ctx.fillRect(bx, by, 80, 55);
      // roof
      ctx.fillStyle = sc==='night' ? '#1a0a00' : '#8B4513';
      ctx.beginPath();
      ctx.moveTo(bx-10, by);
      ctx.lineTo(bx+40, by-35);
      ctx.lineTo(bx+90, by);
      ctx.closePath();
      ctx.fill();
      // door
      ctx.fillStyle = sc==='night' ? '#0a0500' : '#7a4010';
      ctx.fillRect(bx+30, by+28, 20, 27);
      // window with warm glow
      ctx.fillStyle = sc==='night' ? 'rgba(255,200,80,0.9)' : 'rgba(255,240,180,0.8)';
      ctx.fillRect(bx+8, by+10, 18, 14);
      ctx.fillRect(bx+54, by+10, 18, 14);
      if (sc==='night') {
        // glow effect
        const grd = ctx.createRadialGradient(bx+17, by+17, 2, bx+17, by+17, 30);
        grd.addColorStop(0,'rgba(255,200,80,0.3)');
        grd.addColorStop(1,'rgba(255,200,80,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(bx-10, by-5, 55, 45);
      }
    }

    function spawnParticles(sc) {
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      const type = SCENES[sc].particles;
      const count = type==='rain' ? 60 : type==='star' ? 40 : 20;
      particles = [];
      for (let i=0; i<count; i++) {
        particles.push({
          x: Math.random()*w, y: Math.random()*h,
          vy: type==='rain' ? 2+Math.random()*3 : type==='star' ? 0 : 0.5+Math.random(),
          vx: type==='rain' ? 0.5 : type==='petal' ? (Math.random()-0.5)*0.8 : (Math.random()-0.5)*0.3,
          size: type==='rain' ? 1+Math.random() : type==='star' ? 1+Math.random()*2 : 4+Math.random()*5,
          alpha: type==='star' ? 0.4+Math.random()*0.6 : 0.6+Math.random()*0.4,
          twinkle: Math.random()*Math.PI*2,
          rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.05,
        });
      }
    }

    function drawParticle(p, sc) {
      const type = SCENES[sc].particles;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      if (type==='rain') {
        ctx.strokeStyle='rgba(150,180,220,0.7)';
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x+1, p.y+8);
        ctx.stroke();
      } else if (type==='star') {
        p.twinkle += 0.03;
        ctx.fillStyle=`rgba(255,255,200,${p.alpha*(0.6+0.4*Math.sin(p.twinkle))})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
      } else if (type==='petal') {
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle='rgba(255,180,200,0.75)';
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size*0.5, 0, 0, Math.PI*2);
        ctx.fill();
      } else { // leaf
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle='rgba(100,180,80,0.7)';
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size*0.5, p.size, 0, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawScene(sc) {
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      const s = SCENES[sc];
      // sky gradient
      const grad = ctx.createLinearGradient(0,0,0,h*0.7);
      grad.addColorStop(0, s.sky[0]);
      grad.addColorStop(1, s.sky[1]);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      // ground
      ctx.fillStyle = s.ground;
      ctx.fillRect(0, h*0.72, w, h);
      // ground line
      ctx.strokeStyle = s.groundLine;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, h*0.72); ctx.lineTo(w, h*0.72); ctx.stroke();
      // sun or moon
      if (sc==='sunny'||sc==='sakura'||sc==='cafe') {
        ctx.fillStyle = sc==='cafe' ? '#ffd070' : '#FFD700';
        ctx.beginPath(); ctx.arc(w*0.82, h*0.18, 22, 0, Math.PI*2); ctx.fill();
        // rays
        ctx.strokeStyle = sc==='cafe' ? 'rgba(255,200,80,0.4)' : 'rgba(255,215,0,0.4)';
        ctx.lineWidth = 2;
        for (let i=0;i<8;i++) {
          const a = (i/8)*Math.PI*2 + treeWobble*0.005;
          ctx.beginPath();
          ctx.moveTo(w*0.82+Math.cos(a)*25, h*0.18+Math.sin(a)*25);
          ctx.lineTo(w*0.82+Math.cos(a)*36, h*0.18+Math.sin(a)*36);
          ctx.stroke();
        }
      } else if (sc==='night') {
        // moon
        ctx.fillStyle='rgba(255,255,200,0.95)';
        ctx.beginPath(); ctx.arc(w*0.8, h*0.18, 18, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle=s.sky[0];
        ctx.beginPath(); ctx.arc(w*0.8+8, h*0.15, 14, 0, Math.PI*2); ctx.fill();
      } else if (sc==='rain') {
        // clouds
        ctx.fillStyle='rgba(180,200,220,0.8)';
        [[w*0.2,h*0.15,45,25],[w*0.6,h*0.1,55,28],[w*0.85,h*0.2,40,22]].forEach(([cx,cy,rx,ry])=>{
          ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.fill();
        });
      }
      // trees
      drawTree(w*0.08, h*0.72, sc, treeWobble);
      drawTree(w*0.88, h*0.72, sc, treeWobble+30);
      // cabin
      drawCabin(sc);
      // particles
      particles.forEach(p => drawParticle(p, sc));
      // animals
      animals.forEach(a => drawAnimal(a, sc));
    }

    function tickParticles(sc) {
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      const type = SCENES[sc].particles;
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.rot += p.rotV;
        if (p.y > h) p.y = -10;
        if (p.x > w+10) p.x = -10;
        if (p.x < -10) p.x = w+10;
      });
    }

    function initScene(sc) {
      sceneType = sc;
      spawnParticles(sc);
      placeAnimals();
    }

    function loop() {
      treeWobble++;
      animals.forEach(a => { a.frame++; a.x += a.speed * a.dir; });
      ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
      drawScene(sceneType);
      tickParticles(sceneType);
      frameId = requestAnimationFrame(loop);
    }

    document.querySelectorAll('.scene-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        initScene(btn.dataset.scene);
      });
    });

    initScene('sunny');
    loop();

    // ── Lofi Audio Engine ──
    let ac = null, masterGain = null, lofiNodes = [], isPlaying = false, currentMode = null;
    const volSlider = document.getElementById('vol-slider');
    const playBtn   = document.getElementById('btn-audio-play');
    const audioStatus = document.getElementById('audio-status');

    function getAC() {
      if (!ac) {
        ac = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = ac.createGain();
        masterGain.gain.value = parseFloat(volSlider.value);
        masterGain.connect(ac.destination);
      }
      return ac;
    }
    function makeNoise(ctx, secs=4) {
      const buf = ctx.createBuffer(1, ctx.sampleRate*secs, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
      const src = ctx.createBufferSource(); src.buffer=buf; src.loop=true; return src;
    }
    function biquad(ctx, type, freq, Q=1) {
      const f = ctx.createBiquadFilter(); f.type=type; f.frequency.value=freq; f.Q.value=Q; return f;
    }
    function gain(ctx, val) { const g = ctx.createGain(); g.gain.value=val; return g; }
    function chain(...nodes) { for (let i=0;i<nodes.length-1;i++) nodes[i].connect(nodes[i+1]); return nodes; }

    function buildRainLofi(ctx) {
      const rain = makeNoise(ctx,3);
      chain(rain, biquad(ctx,'bandpass',1200,0.6), biquad(ctx,'highpass',400), gain(ctx,0.18), masterGain);
      rain.start();
      const vinyl = makeNoise(ctx,2);
      chain(vinyl, biquad(ctx,'bandpass',3500,12), gain(ctx,0.028), masterGain);
      vinyl.start();
      const bass = ctx.createOscillator(); bass.type='sine'; bass.frequency.value=55;
      chain(bass, gain(ctx,0.06), masterGain); bass.start();
      return [rain, vinyl, bass];
    }
    function buildNightLofi(ctx) {
      const cricket = makeNoise(ctx,4);
      chain(cricket, biquad(ctx,'bandpass',2800,18), gain(ctx,0.055), masterGain); cricket.start();
      const wind = makeNoise(ctx,3);
      chain(wind, biquad(ctx,'lowpass',180), gain(ctx,0.09), masterGain); wind.start();
      const vinyl = makeNoise(ctx,2);
      chain(vinyl, biquad(ctx,'bandpass',4000,15), gain(ctx,0.018), masterGain); vinyl.start();
      const bass = ctx.createOscillator(); bass.type='sine'; bass.frequency.value=40;
      chain(bass, gain(ctx,0.05), masterGain); bass.start();
      return [cricket, wind, vinyl, bass];
    }
    function buildCafeLofi(ctx) {
      const noise = makeNoise(ctx,3);
      const lp = biquad(ctx,'lowpass',700); const hp = biquad(ctx,'highpass',150);
      noise.connect(lp); lp.connect(hp); chain(hp, gain(ctx,0.07), masterGain); noise.start();
      const clink = makeNoise(ctx,2);
      chain(clink, biquad(ctx,'bandpass',5000,20), gain(ctx,0.013), masterGain); clink.start();
      const vinyl = makeNoise(ctx,2);
      chain(vinyl, biquad(ctx,'bandpass',3200,10), gain(ctx,0.022), masterGain); vinyl.start();
      const bass = ctx.createOscillator(); bass.type='sine'; bass.frequency.value=65;
      chain(bass, gain(ctx,0.05), masterGain); bass.start();
      return [noise, clink, vinyl, bass];
    }
    function buildPianoLofi(ctx) {
      // vinyl pad
      const vinyl = makeNoise(ctx,4);
      chain(vinyl, biquad(ctx,'bandpass',3000,8), gain(ctx,0.016), masterGain); vinyl.start();
      const bass = ctx.createOscillator(); bass.type='sine'; bass.frequency.value=55;
      chain(bass, gain(ctx,0.04), masterGain); bass.start();
      const nodes = [vinyl, bass];
      // Am7 → Fmaj7 → C → G arpeggios
      const prog = [[220,261.6,311.1,392],[174.6,220,261.6,349.2],[261.6,329.6,392,523.3],[196,246.9,293.7,392]];
      const now = ctx.currentTime;
      for (let ci=0;ci<prog.length*8;ci++) {
        const chord = prog[ci%prog.length];
        chord.forEach((freq,ni) => {
          const osc = ctx.createOscillator(); osc.type='sine';
          osc.frequency.value=freq; osc.detune.value=(Math.random()-0.5)*10;
          const env = ctx.createGain();
          const t = now + ci*4 + ni*0.52;
          env.gain.setValueAtTime(0,t);
          env.gain.linearRampToValueAtTime(0.07,t+0.06);
          env.gain.exponentialRampToValueAtTime(0.001,t+0.85);
          chain(osc, biquad(ctx,'lowpass',1600), env, masterGain);
          osc.start(t); osc.stop(t+0.9);
          nodes.push(osc);
        });
      }
      return nodes;
    }

    const BUILDERS = {rain:buildRainLofi, night:buildNightLofi, cafe:buildCafeLofi, piano:buildPianoLofi};
    const MODE_NAMES = {rain:'☔ Rain Lofi', night:'🌙 Night Lofi', cafe:'☕ Café Lofi', piano:'🎹 Soft Piano'};

    function stopLofi() {
      lofiNodes.forEach(n => { try { n.stop(); } catch(e){} });
      lofiNodes = []; isPlaying = false; playBtn.textContent = '▶️ Play';
    }
    function startLofi(mode) {
      const ctx = getAC();
      if (ctx.state==='suspended') ctx.resume();
      stopLofi();
      lofiNodes = BUILDERS[mode](ctx);
      isPlaying = true; currentMode = mode;
      playBtn.textContent = '⏸️ Pause';
      audioStatus.textContent = `♪ ${MODE_NAMES[mode]}`;
    }
    playBtn.addEventListener('click', () => {
      if (!currentMode) return;
      if (isPlaying) {
        ac.suspend(); isPlaying=false; playBtn.textContent='▶️ Play'; audioStatus.textContent='⏸ paused';
      } else {
        ac.resume(); isPlaying=true; playBtn.textContent='⏸️ Pause';
        audioStatus.textContent=`♪ ${MODE_NAMES[currentMode]}`;
      }
    });
    volSlider.addEventListener('input', () => {
      const v = parseFloat(volSlider.value);
      if (masterGain) masterGain.gain.value = v;
      document.getElementById('vol-icon').textContent = v===0?'🔇':v<0.4?'🔉':'🔊';
    });
    document.querySelectorAll('.amb-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.amb-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.amb;
        startLofi(currentMode); playBtn.disabled=false;
        showSpeech(`♪ ${MODE_NAMES[currentMode]} — cozy mode on 🧸`);
      });
    });

    // ── Weather themes ──
    document.querySelectorAll('.weather-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const w = btn.dataset.weather;
        if (w) document.body.setAttribute('data-weather', w);
        else document.body.removeAttribute('data-weather');
        document.querySelectorAll('.weather-btn').forEach(b => b.classList.toggle('active', b === btn));
        localStorage.setItem('mocha-weather', w);
      });
    });
    const savedWeather = localStorage.getItem('mocha-weather');
    if (savedWeather) {
      document.body.setAttribute('data-weather', savedWeather);
      document.querySelectorAll('.weather-btn').forEach(b => b.classList.toggle('active', b.dataset.weather === savedWeather));
    }

    // ── Boot ──
    buildTomatoes();
    setMoodMsg();
  </script>
</body>
</html>
